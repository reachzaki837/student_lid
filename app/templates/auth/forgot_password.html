<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Forgot Password | StudentLID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
        }

        .page-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }

        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 24px;
        }

        .logo-icon {
            background-color: #2563eb;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 20px;
        }

        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
        }

        h1 {
            font-size: 30px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }

        p.subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 28px;
        }

        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }

        .input-group-custom i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
        }

        .input-group-custom input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }

        .input-group-custom input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }

        .btn-submit {
            background-color: #2563eb;
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            transition: background-color 0.2s;
        }

        .btn-submit:hover {
            background-color: #1d4ed8;
        }

        .helper-link {
            margin-top: 16px;
            text-align: center;
            font-size: 14px;
        }

        .helper-link a {
            color: #2563eb;
            text-decoration: none;
            font-weight: 600;
        }

        .helper-link a:hover {
            text-decoration: underline;
        }

        .info-alert {
            background-color: #eff6ff;
            color: #1d4ed8;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #bfdbfe;
        }
    </style>
</head>

<body>
    <div class="page-container">
        {% if message %}
        <div class="info-alert"><i class="bi bi-info-circle me-1"></i> {{ message }}</div>
        {% endif %}

        <div class="logo-container">
            <div class="logo-icon"><i class="bi bi-book"></i></div>
            <div class="logo-text">StudentLID</div>
        </div>

        <h1>Forgot password?</h1>
        <p class="subtitle">Enter your email and we will send you a one-time reset link.</p>

        <form action="/auth/forgot-password" method="post">
            <div class="input-group-custom">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" placeholder="name@university.edu" required>
            </div>
            <button type="submit" class="btn-submit">Send reset link</button>
        </form>

        <div class="helper-link">
            Remembered your password? <a href="/auth/login">Back to login</a>
        </div>
    </div>
</body>

</html>
