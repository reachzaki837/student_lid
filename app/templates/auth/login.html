<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login | StudentLID</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.5/font/bootstrap-icons.css">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
    <style>
        body {
            margin: 0;
            padding: 0;
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #ffffff;
            font-family: 'Inter', sans-serif;
        }
        .login-container {
            width: 100%;
            max-width: 420px;
            padding: 20px;
        }
        .logo-container {
            display: flex;
            align-items: center;
            gap: 10px;
            margin-bottom: 30px;
        }
        .logo-icon {
            background-color: #2563eb;
            color: white;
            padding: 8px 12px;
            border-radius: 8px;
            font-size: 20px;
        }
        .logo-text {
            font-size: 20px;
            font-weight: 800;
            color: #0f172a;
        }
        h1 {
            font-size: 32px;
            font-weight: 800;
            color: #0f172a;
            margin-bottom: 8px;
        }
        p.subtitle {
            color: #64748b;
            font-size: 15px;
            margin-bottom: 30px;
        }
        .form-label {
            font-size: 13px;
            font-weight: 600;
            color: #475569;
            margin-bottom: 6px;
        }
        .input-group-custom {
            position: relative;
            margin-bottom: 20px;
        }
        .input-group-custom i {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            color: #94a3b8;
            font-size: 16px;
        }
        .input-group-custom input {
            width: 100%;
            padding: 12px 12px 12px 42px;
            border: 1px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            color: #0f172a;
            outline: none;
            transition: border-color 0.2s, box-shadow 0.2s;
        }
        .input-group-custom input::placeholder { color: #94a3b8; }
        .input-group-custom input:focus {
            border-color: #2563eb;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .extra-links {
            display: flex;
            justify-content: space-between;
            align-items: center;
            font-size: 14px;
            margin-bottom: 24px;
        }
        .extra-links span { color: #64748b; font-weight: 500; }
        .extra-links a { color: #2563eb; text-decoration: none; font-weight: 600; }
        .extra-links a:hover { text-decoration: underline; }
        .btn-submit {
            background-color: #2563eb;
            color: #ffffff;
            width: 100%;
            padding: 14px;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            font-weight: 600;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            cursor: pointer;
            box-shadow: 0 4px 14px rgba(37, 99, 235, 0.3);
            transition: background-color 0.2s, transform 0.1s;
        }
        .btn-submit:hover { background-color: #1d4ed8; }
        .btn-submit:active { transform: scale(0.98); }
        .divider {
            display: flex;
            align-items: center;
            margin: 24px 0;
            gap: 12px;
        }
        .divider::before, .divider::after {
            content: "";
            flex: 1;
            height: 1px;
            background-color: #e2e8f0;
        }
        .divider span {
            font-size: 13px;
            font-weight: 500;
            color: #94a3b8;
            text-transform: uppercase;
            letter-spacing: 0.05em;
        }
        /* Google button — plain <a> tag styled as button */
        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            width: 100%;
            padding: 12px;
            border: 1.5px solid #e2e8f0;
            border-radius: 8px;
            font-size: 15px;
            font-weight: 600;
            color: #1f2937;
            background-color: #ffffff;
            text-decoration: none;
            transition: all 0.2s ease;
        }
        .btn-google:hover {
            background-color: #f8fafc;
            border-color: #cbd5e1;
            box-shadow: 0 2px 8px rgba(0, 0, 0, 0.06);
            color: #1f2937;
        }
        .btn-google:active { transform: scale(0.98); }
        .btn-google svg { width: 20px; height: 20px; flex-shrink: 0; }
        .register-footer {
            text-align: center;
            margin-top: 30px;
            font-size: 14px;
            color: #64748b;
        }
        .register-footer a {
            color: #2563eb;
            font-weight: 700;
            text-decoration: none;
        }
        .register-footer a:hover { text-decoration: underline; }
        .error-alert {
            background-color: #fef2f2;
            color: #ef4444;
            padding: 12px;
            border-radius: 8px;
            font-size: 14px;
            font-weight: 500;
            margin-bottom: 20px;
            text-align: center;
            border: 1px solid #fecaca;
        }
    </style>
</head>
<body>
    <div class="login-container">

        {% if error %}
        <div class="error-alert"><i class="bi bi-exclamation-circle me-1"></i> {{ error }}</div>
        {% endif %}

        <div class="logo-container">
            <div class="logo-icon"><i class="bi bi-book"></i></div>
            <div class="logo-text">StudentLID</div>
        </div>

        <h1>Welcome back</h1>
        <p class="subtitle">Please enter your details to access your dashboard.</p>

        <!-- Google Sign-In — simple link, no JS needed -->
        <a href="/auth/google" class="btn-google">
            <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
                <path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/>
                <path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/>
                <path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/>
                <path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/>
            </svg>
            Continue with Google
        </a>

        <div class="divider"><span>or</span></div>

        <form action="/auth/login" method="post">
            <div class="form-label">Email Address</div>
            <div class="input-group-custom">
                <i class="bi bi-envelope"></i>
                <input type="email" name="email" placeholder="name@university.edu" required>
            </div>

            <div class="form-label">Password</div>
            <div class="input-group-custom">
                <i class="bi bi-lock"></i>
                <input type="password" name="password" placeholder="••••••••" required>
            </div>

            <div class="extra-links">
                <span>Remember me</span>
                <a href="#">Forgot password?</a>
            </div>

            <button type="submit" class="btn-submit">
                Sign In <i class="bi bi-arrow-right"></i>
            </button>
        </form>

        <div class="register-footer">
            Don't have an account? <a href="/auth/register">Register a new account</a>
        </div>
    </div>
    <!-- Vercel Speed Insights -->
    <script>
        window.si = window.si || function () { (window.siq = window.siq || []).push(arguments); };
    </script>
    <script defer src="/_vercel/speed-insights/script.js"></script>
</body>
</html>
